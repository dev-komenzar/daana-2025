services:
  pocketbase:
    build:
      context: ./pocketbase
    container_name: daana-pocketbase
    restart: unless-stopped
    ports:
      - '8090:8090'
    volumes:
      - pb_data:/pb/pb_data
      - ./pocketbase/pb_migrations:/pb/pb_migrations
      - ./pocketbase/pb_hooks:/pb/pb_hooks:ro
    healthcheck:
      test:
        ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:8090/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pb_data:
    name: daana-pb-data
