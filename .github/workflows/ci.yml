name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (check / lint / lint:style)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HUSKY: 0
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # svelte-kit sync が $env/static/private の型を生成するために .env が必要。
      # 実値はネットワーク呼び出しをしないのでダミーで十分 (本番値は GitHub Secrets 経由)。
      - name: Prepare .env from .env.example
        run: cp .env.example .env

      - name: Type check (pnpm check)
        run: pnpm check

      - name: ESLint (pnpm lint:ci)
        run: pnpm lint:ci

      - name: Stylelint (pnpm lint:style:ci)
        run: pnpm lint:style:ci

      - name: Unit test (pnpm test:unit)
        run: pnpm test:unit
