name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (check / lint / lint:style)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HUSKY: 0
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (pnpm check)
        run: pnpm check

      - name: ESLint (pnpm lint:ci)
        run: pnpm lint:ci

      - name: Stylelint (pnpm lint:style:ci)
        run: pnpm lint:style:ci
