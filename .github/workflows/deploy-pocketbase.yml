name: Deploy PocketBase

on:
  push:
    branches: [main]
    paths:
      - pocketbase/Dockerfile
      - pocketbase/pb_migrations/**
      - pocketbase/pb_hooks/**
      - .github/workflows/deploy-pocketbase.yml

concurrency:
  group: deploy-pocketbase-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dev-komenzar/daana-pocketbase

jobs:
  build-and-push:
    name: Build & Push PocketBase image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: pocketbase
          file: pocketbase/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 5

    steps:
      - name: Trigger Coolify webhook
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "${{ secrets.COOLIFY_WEBHOOK_PB }}"
